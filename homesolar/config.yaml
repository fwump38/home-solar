# Home Assistant Add-on: HomeSolar - Solar Ephemeris
name: "HomeSolar - Solar Ephemeris"
version: "1.4.0"
slug: "homesolar"
description: "Complete solar ephemeris based on NOAA algorithm. Shows sunrise/sunset, civil/nautical/astronomical twilights, day length and progression."
url: "https://github.com/pehadavid/home-solar"
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: "mdi:weather-sunny"
panel_title: "HomeSolar"
homeassistant_api: true
init: false
map:
  - type: share
    read_only: false
options:
  latitude: 48.8566
  longitude: 2.3522
  timezone: "Europe/Paris"
  language: "auto"
schema:
  latitude: float
  longitude: float
  timezone: str
  language: "list(auto|en|fr)"
